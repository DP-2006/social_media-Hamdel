{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>Swagger UI</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://lib.arvancloud.ir/swagger-ui/4.9.1/swagger-ui.min.css">
</head>

<body>
    <div id="swagger-ui"></div>
    <script src="https://lib.arvancloud.ir/swagger-ui/4.9.1/swagger-ui-bundle.min.js"></script>
    <script src="https://lib.arvancloud.ir/swagger-ui/4.9.1/swagger-ui-standalone-preset.min.js"></script>
    <script>
        window.onload = function() {
            const ui = SwaggerUIBundle({
                url: "/api/schema/",
                dom_id: '#swagger-ui',
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIBundle.SwaggerUIStandalonePreset
                ],
                layout: "BaseLayout",
                deepLinking: true,
            });
        }
    </script>
</body>

</html>
